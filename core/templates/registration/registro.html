{% extends 'core/base.html' %}

{% block title %}
Registro | Titan Gym
{% endblock %}

{% block content %}

<section class="login-section d-flex align-items-center">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="login-card">

                    <h2 class="text-center fw-bold mb-4">
                        Crear Cuenta
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button type="submit"
                                class="btn btn-warning w-100 fw-bold">

                            Registrarse

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
