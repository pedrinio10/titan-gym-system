{% extends 'core/base.html' %}

{% block title %}
Crear Socio
{% endblock %}

{% block content %}

<section class="container py-5 text-white">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card bg-dark p-5">

                <h1 class="fw-bold text-warning mb-4">
                    Crear Socio
                </h1>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" placeholder="Ej: 3511234567">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button class="btn btn-warning w-100 fw-bold py-3">
                        Guardar socio
                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

{% endblock %}
